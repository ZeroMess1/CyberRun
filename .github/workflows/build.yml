name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip build-essential git libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev zlib1g-dev autoconf libtool pkg-config cmake openjdk-17-jdk unzip zip
          pip3 install --upgrade buildozer cython==0.29.36 virtualenv

      - name: Build APK
        run: |
          buildozer android debug 2>&1 | tee build.log
          grep -i "error\|exception\|traceback\|failed" build.log | tail -50 || true
          ls bin/ || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CyberRunner-APK
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30

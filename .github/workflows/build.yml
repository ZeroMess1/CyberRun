name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK
        uses: mobile-dev-inc/action-buildozer@v1.3.0
        with:
          command: android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CyberRunner-APK
          path: bin/*.apk
          retention-days: 30
